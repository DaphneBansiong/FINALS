<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activities</title>

<link rel="icon" href="https://i.pinimg.com/1200x/f9/10/33/f9103349fe375a9542158f355ed5a75a.jpg">

<style>
@import url('https://fonts.cdnfonts.com/css/horizon');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: url("https://i.pinimg.com/1200x/19/32/4d/19324dde3a91520e6da87bfe26062e27.jpg") no-repeat center center/cover;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:0;
}

h1{
  position:relative;
  z-index:1;
  font-family: 'Horizon', sans-serif;
  font-size:40px;
  color:white;
  margin-bottom:25px;
  letter-spacing:2px;

  text-shadow:
    0 0 10px white,
    0 0 20px white;
}

.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  gap:18px;
}

a.btn{
  position:relative;
  width:260px;
  padding:16px 20px;
  text-align:center;
  color:white;
  font-size:18px;
  letter-spacing:1px;
  border-radius:15px;
  text-decoration:none;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border:1px solid rgba(255,255,255,0.25);

  overflow:hidden;

  box-shadow: 0 0 15px rgba(255,255,255,0.15);

  transition: all 0.3s ease;
}

a.btn:hover{
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(255,255,255,0.6),
              0 0 40px rgba(255,255,255,0.3);
}

a.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.4),
    transparent
  );
  transition:0.5s;
}

a.btn:hover::before{
  left:120%;
}
</style>

</head>

<body>

<h1>COMPILED ACTIVITIES</h1>

<div class="container">

  <a class="btn" href="actevity2.html">Activity #2</a>
  <a class="btn" href="activity3.html">Activity #3</a>
  <a class="btn" href="activity4.html">Activity #4</a>
  <a class="btn" href="garfield.html">Activity #5</a>
  <a class="btn" href="activity7.html">Activity #7</a>
</div>

</body>
</html>
