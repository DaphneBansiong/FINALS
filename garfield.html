<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garfield's Home</title>

<link rel="icon" href="https://i.pinimg.com/1200x/f9/10/33/f9103349fe375a9542158f355ed5a75a.jpg">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;900&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Montserrat', sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}


.bg{
  position:absolute;
  width:100%;
  height:100%;
  background: url('https://i.pinimg.com/736x/85/c3/2e/85c32e7e0b8a5529281110e1751ef156.jpg') no-repeat center/cover;
  
  /* stronger pop */
  filter: brightness(0.85) contrast(1.35) saturate(1.25) sharpen(1);
  
  transform: scale(1.08);
}


.overlay{
  position:absolute;
  width:100%;
  height:100%;
  
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.2),
    rgba(0,0,0,0.3)
  );
}


.content{
  position:relative;
  text-align:center;
  color:white;
  z-index:2;
  padding:20px;
}


.content h1{
  font-size:4.2rem;
  font-weight:900;
  letter-spacing:3px;
  
  /* stronger glow pop */
  text-shadow: 
    0 5px 20px rgba(0,0,0,0.8),
    0 0 25px rgba(255,255,255,0.25);
    
  margin-bottom:35px;
}


.btn{
  display:inline-block;
  padding:15px 45px;
  font-size:1.2rem;
  color:white;
  text-decoration:none;
  border-radius:18px;

  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(14px);
  border:1px solid rgba(255,255,255,0.4);

  transition: all 0.3s ease;
}


.btn:hover{
  background: rgba(255,255,255,0.35);
  transform: translateY(-6px) scale(1.06);
  box-shadow: 0 12px 40px rgba(0,0,0,0.6);
}

</style>
</head>
<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
  <h1>FEED ME LASAGNA</h1>
  <a href="activity2.html" class="btn">LASAGNA</a>
</div>

</body>
</html>
