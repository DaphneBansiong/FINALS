<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Garfield's Player</title>


<link rel="icon" href="https://i.pinimg.com/1200x/f9/10/33/f9103349fe375a9542158f355ed5a75a.jpg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:'Poppins',sans-serif;
}

body{
  height:100vh;
  background:url('https://i.pinimg.com/736x/e8/94/2a/e8942ad188d666e513a295299b002783.jpg') center/cover no-repeat;
  display:flex;
  justify-content:center;
  align-items:center;
}


body::before{
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  backdrop-filter: blur(25px) brightness(1.2);
}


.container{
  position:relative;
  width:350px;
  padding:20px;
  border-radius:25px;
  background: rgba(255,255,255,0.15);
  backdrop-filter: blur(20px);
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
  text-align:center;
  color:white;
  transition: all 0.3s ease;
}


.container:hover{
  transform: scale(1.05);
  box-shadow:0 20px 50px rgba(0,0,0,0.6);
  background: rgba(255,255,255,0.25);
}


h1{
  margin-bottom:5px;
}


.artist{
  font-size:14px;
  opacity:0.8;
  margin-bottom:10px;
}


.vinyl{
  width:180px;
  height:180px;
  margin:10px auto;
  background:url('https://i.scdn.co/image/ab67616d00001e02c87bfeef81a210ddb7f717b5') center/cover no-repeat;
  border-radius:50%;
  animation: spin 6s linear infinite;
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}

@keyframes spin{
  from{transform:rotate(0deg);}
  to{transform:rotate(360deg);}
}


.player{
  margin-top:20px;
  padding:15px;
  border-radius:20px;
  background: rgba(43, 13, 13, 0.2);
  backdrop-filter: blur(15px);
}


.controls{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin-top:10px;
}

.controls button{
  border:none;
  width:45px;
  height:45px;
  border-radius:50%;
  background: rgba(255,255,255,0.3);
  color:white;
  font-size:18px;
  cursor:pointer;
  transition:0.3s;
}

.controls button:hover{
  background:white;
  color:black;
}


.play{
  width:60px;
  height:60px;
  font-size:22px;
}


.volume{
  margin-top:10px;
}

input[type="range"]{
  width:100%;
  accent-color: black;
}
</style>
</head>

<body>

<div class="container">
  <h1>Is there someone else?</h1>
  <div class="artist">THE WEEKND</div>


  <div class="vinyl"></div>

  <div class="player">
    <div class="controls">
      <button onclick="restart()">⏮</button>
      <button class="play" onclick="togglePlay()">▶</button>
      <button onclick="forward()">⏭</button>
    </div>

    <div class="volume">
      <input type="range" min="0" max="100" value="50" onchange="setVolume(this.value)">
    </div>

    
    <audio id="audio" src="videoplayback.m4a"></audio>
  </div>
</div>

<script>
const audio = document.getElementById("audio");
const playBtn = document.querySelector(".play");

let isPlaying = false;


function togglePlay(){
  if(!isPlaying){
    audio.play();
    playBtn.innerHTML = "⏸";
    isPlaying = true;
  } else {
    audio.pause();
    playBtn.innerHTML = "▶";
    isPlaying = false;
  }
}

function restart(){
  audio.currentTime -= 10;
}

function forward(){
  audio.currentTime += 10;
}

function setVolume(val){
  audio.volume = val / 100;
}

audio.addEventListener("ended", ()=>{
  playBtn.innerHTML = "▶";
  isPlaying = false;
});
</script>

</body>
</html>
