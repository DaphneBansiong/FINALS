<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Activity #3</title>

<link rel="icon" href="https://i.pinimg.com/1200x/f9/10/33/f9103349fe375a9542158f355ed5a75a.jpg">

<style>
@import url('https://fonts.cdnfonts.com/css/horizon');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: Arial, sans-serif;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  background: url("https://i.pinimg.com/736x/ab/d8/07/abd8078c0e7fef6f0e622d6bf522dbb1.jpg") no-repeat center center/cover;
  overflow:hidden;
}


body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.45);
  z-index:0;
}


h1{
  position:relative;
  z-index:1;
  font-family: 'Horizon', sans-serif;
  font-size:32px;
  color:white;
  margin-bottom:25px;
  letter-spacing:2px;

  text-shadow:
    0 0 10px white,
    0 0 20px white;
}


.container{
  position:relative;
  z-index:1;
  display:flex;
  flex-direction:column;
  gap:18px;
}


.btn{
  position:relative;
  width:260px;
  padding:16px 20px;
  text-align:center;
  color:white;
  font-size:18px;
  letter-spacing:1px;
  border-radius:15px;

  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border:1px solid rgba(255,255,255,0.25);

  box-shadow: 0 0 15px rgba(255,255,255,0.15);


  transition: all 0.3s ease;

  overflow:hidden;
}


.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:120%;
  height:100%;
  background: linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.35),
    transparent
  );
  transform: skewX(-20deg);
}


.btn:hover{
  transform: translateY(-6px) scale(1.05);
  box-shadow: 
    0 0 25px rgba(255,255,255,0.6),
    0 0 45px rgba(255,255,255,0.3);
}


.btn:hover::before{
  animation: shine 0.8s ease forwards;
}

@keyframes shine{
  0%{ left:-120%; }
  100%{ left:120%; }
}
</style>

</head>

<body>

<h1>CSS HOVER, SHADOW & TRANSITION</h1>

<div class="container">
  <div class="btn">Garfield: The Movie (2004)</div>
  <div class="btn">Garfield: A Tail of Two Kitties (2006)</div>
  <div class="btn">Garfield Gets Real (2007)</div>
  <div class="btn">Garfield's Fun Fest (2008)</div>
</div>

</body>
</html>
